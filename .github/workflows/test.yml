name: build
on:
  pull_request:
    branches:
      - v1
  push:
    branches:
      - v1
  workflow_dispatch:
jobs:
  test_matrix:
    name: Build test matrix
    runs-on: ubuntu-latest
    outputs:
      paths: ${{ steps.paths.outputs.JSON_CONTENT }}
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Output matrix
        id: paths
        run: |
          set -e
          set -o pipefail
          if [ ! -d tests ]; then
            echo "Error: Failed to find tests directory"
            ls -l
            exit 1
          fi
          content=$(jq -ncR '[inputs]' <<< $(find tests -mindepth 2 -maxdepth 2 -type f -name VELBUILD | xargs -rn1 dirname | xargs -rn1 basename))
          echo "$content"
          echo 'JSON_CONTENT<<EOF' >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: test_matrix
    strategy:
      matrix:
        path: ${{ fromJson(needs.test_matrix.outputs.paths) }}
        driver:
          - podman
          - docker
      fail-fast: false
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: get arch
        id: arch
        run: |
          set -e
          echo -n "arch=" >>$GITHUB_OUTPUT
          if [ ! -f "$arch_file" ];then
            echo "noarch" >>$GITHUB_OUTPUT
          else
            cat "$arch_file" | head -zn1 >>$GITHUB_OUTPUT
          fi
        env:
          arch_file: tests/${{ matrix.path }}/arch
      - name: Run action
        uses: ./
        with:
          path: tests/${{ matrix.path }}
          driver: ${{ matrix.driver }}
          arch: ${{ steps.arch.outputs.arch }}
      - name: Validate output
        if: "!cancelled()"
        shell: bash
        run: |
          set -e
          "$script"
        env:
          script: tests/${{ matrix.path }}/validate.sh
  test-version:
    name: Test version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Run action
        uses: ./
        with:
          path: tests/basic
          version: 0.0.7
      - name: Validate output
        if: "!cancelled()"
        shell: bash
        run: |
          set -e
          tests/basic/validate.sh
